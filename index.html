<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 6A2 - THCS Long Trường</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        @keyframes floatOver { 0% { transform: translateX(-500px); } 100% { transform: translateX(calc(100vw + 500px)); } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 0.8; transform: scale(1.2); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 30s linear infinite; }
        .animate-twinkle { animation: twinkle linear infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; border: 2px solid white; }
        .cloud-animate { position: absolute; opacity: 0.5; filter: blur(1px); pointer-events: none; }
        .theme-option { cursor: pointer; transition: all 0.3s; border: 4px solid transparent; }
        .theme-option.selected { border-color: #3b82f6; transform: scale(1.1); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#e0f2fe] via-[#38bdf8] to-[#0c4a6e] relative selection:bg-blue-200 text-slate-800">

    <div id="stars-container" class="fixed inset-0 pointer-events-none"></div>

    <div class="absolute top-10 right-10 z-0 scale-75 md:scale-100">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-56 h-56 bg-yellow-300 rounded-full blur-[60px] opacity-40 animate-pulse"></div>
            <div class="w-32 h-32 bg-gradient-to-tr from-yellow-200 via-yellow-400 to-orange-500 rounded-full shadow-[0_0_100px_rgba(251,191,36,0.8)] relative z-10 flex items-center justify-center">
                <i data-lucide="sun" class="w-16 h-16 text-white/90 drop-shadow-xl"></i>
            </div>
            <div class="absolute inset-0 animate-spin-slow" id="sun-rays"></div>
        </div>
    </div>

    <div id="clouds-container" class="fixed inset-0 pointer-events-none z-20 overflow-hidden"></div>

    <div class="relative z-10 container mx-auto px-6 py-16">
        <header class="text-center mb-20 text-blue-900">
            <div class="inline-flex flex-col items-center gap-2 mb-4 px-8 py-3 bg-white/40 backdrop-blur-md rounded-3xl text-sm font-black text-blue-800 border border-white/40 shadow-lg">
                <div class="flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4 text-yellow-500"></i> NIÊN KHÓA 2025 - 2026
                </div>
                <div class="text-[10px] tracking-[0.2em] opacity-70 uppercase">Trường THCS Long Trường</div>
            </div>
            <h1 class="text-7xl md:text-9xl font-black mb-8 drop-shadow-[0_8px_8px_rgba(0,0,0,0.15)] tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-blue-900 via-blue-800 to-blue-700">LỚP 6A2</h1>
            <div class="inline-block bg-white/40 backdrop-blur-xl px-12 py-5 rounded-[2.5rem] border border-white/60 shadow-2xl transform -rotate-1 hover:rotate-0 transition-all">
                <p class="text-2xl md:text-3xl italic font-black text-blue-900/90 drop-shadow-sm">"Ngôi nhà chung rực rỡ sắc màu"</p>
            </div>
        </header>

        <section class="max-w-4xl mx-auto mb-32 relative group">
            <div class="absolute -inset-4 bg-white/20 blur-2xl rounded-[4rem] -z-10 group-hover:bg-blue-300/30 transition-all duration-700"></div>
            <div class="bg-white/85 backdrop-blur-3xl rounded-[4rem] p-12 shadow-2xl border border-white flex flex-col md:flex-row items-center gap-12 transform hover:-translate-y-2 transition-all duration-700">
                <div class="relative">
                    <div class="w-56 h-56 bg-gradient-to-tr from-blue-500 via-sky-300 to-indigo-400 rounded-[3rem] flex items-center justify-center text-8xl shadow-2xl border-[10px] border-white overflow-hidden shrink-0 rotate-3 group-hover:rotate-0 transition-all duration-700">👩‍🏫</div>
                    <div class="absolute -bottom-6 -right-6 bg-rose-500 text-white p-4 rounded-[1.5rem] shadow-xl animate-bounce border-4 border-white">
                        <i data-lucide="heart" class="w-8 h-8 fill-white text-white"></i>
                    </div>
                </div>
                <div class="text-center md:text-left flex-1">
                    <h2 class="text-blue-500 font-black text-sm uppercase tracking-[0.4em] mb-4">Giáo viên chủ nhiệm</h2>
                    <h3 class="text-5xl md:text-6xl font-black text-blue-950 mb-6 leading-tight drop-shadow-sm">Cô Nguyễn Thị Hồng Nhung</h3>
                    <p class="text-blue-900/80 leading-relaxed italic text-xl font-bold bg-blue-50/50 p-6 rounded-[2rem] border border-blue-100">"Chào các con học sinh lớp 6A2 - Long Trường. Hãy cùng cô viết nên những trang kỷ niệm đẹp nhất dưới mái trường này nhé!"</p>
                </div>
            </div>
        </section>

        <div id="student-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 md:gap-8 relative pb-32"></div>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 md:p-8 bg-sky-950/80 backdrop-blur-xl transition-all">
        <div class="bg-white rounded-[4rem] w-full max-w-2xl overflow-hidden shadow-2xl border-[12px] border-white/20 relative">
            <div id="modal-header" class="p-10 flex justify-between items-center text-white bg-gradient-to-r from-sky-600 to-blue-700">
                <div class="flex items-center gap-5">
                    <div class="bg-white/20 p-4 rounded-[1.5rem] shadow-inner" id="modal-icon"><i data-lucide="user" class="w-7 h-7"></i></div>
                    <div>
                        <h3 id="modal-title" class="text-3xl font-black tracking-tight uppercase leading-none">Thông Tin</h3>
                        <p id="modal-subtitle" class="text-sm text-white/70 mt-2 font-black tracking-[0.3em] uppercase"></p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="editCurrentProfile()" id="edit-btn" class="hidden bg-white/20 hover:bg-white/40 p-4 rounded-full transition-all"><i data-lucide="edit-3" class="w-6 h-6"></i></button>
                    <button onclick="closeModal()" class="bg-white/20 hover:bg-red-500 p-4 rounded-full transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
            </div>
            <div id="modal-content" class="p-10 space-y-8 max-h-[70vh] overflow-y-auto custom-scrollbar bg-slate-50/50"></div>
        </div>
    </div>

    <script>
        // CẤU HÌNH SUPABASE
        const SB_URL = 'https://kwaxleppbbrjukcrofoz.supabase.co';
        const SB_KEY = 'sb_publishable_YAOpIhazDHiiEb7gyYI4pw_y91wzrTG';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let students = {};
        let selectedSlot = null;
        let currentTheme = 'bg-white text-blue-900';
        let currentImageBase64 = null;

        const colorThemes = [
            { name: 'Trắng', class: 'bg-white text-blue-900' },
            { name: 'Xanh', class: 'bg-gradient-to-br from-blue-50 to-sky-100 text-blue-900' },
            { name: 'Hồng', class: 'bg-gradient-to-br from-rose-50 to-pink-100 text-rose-900' },
            { name: 'Vàng', class: 'bg-gradient-to-br from-amber-50 to-yellow-100 text-amber-900' },
            { name: 'Tím', class: 'bg-gradient-to-br from-purple-50 to-indigo-100 text-purple-900' },
            { name: 'Lục', class: 'bg-gradient-to-br from-emerald-50 to-teal-100 text-emerald-900' }
        ];

        async function loadData() {
            const { data, error } = await _supabase.from('students').select('*');
            if (error) return console.error(error);
            students = {};
            data.forEach(s => { students[s.slot_index] = s; });
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('student-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const s = students[i];
                const btn = document.createElement('button');
                btn.onclick = () => handleOpenSlot(i);
                const theme = s?.colorTheme || 'bg-white/20 hover:bg-white/40 border-dashed border-white/50 backdrop-blur-md';
                btn.className = `aspect-square rounded-[3rem] transition-all duration-500 transform hover:scale-105 shadow-2xl flex flex-col items-center justify-center p-3 border-4 ${s ? s.colorTheme + ' border-white/50' : 'bg-white/20 border-dashed border-white/50 backdrop-blur-md'}`;
                
                if (s) {
                    const shortName = s.name.split(' ').slice(-2).join(' ');
                    btn.innerHTML = `<div class="w-24 h-24 md:w-28 md:h-28 rounded-[2.5rem] overflow-hidden border-4 border-white shadow-lg bg-sky-50 mb-2">
                        ${s.avatarImage ? `<img src="${s.avatarImage}" class="w-full h-full object-cover">` : `<i data-lucide="user" class="w-full h-full p-6 text-sky-200"></i>`}
                    </div><span class="text-base font-black truncate w-full">${shortName}</span>`;
                } else {
                    btn.innerHTML = `<span class="text-white/60 font-black text-5xl">#${i + 1}</span>`;
                }
                grid.appendChild(btn);
            }
            lucide.createIcons();
        }

        function handleOpenSlot(i) {
            selectedSlot = i;
            const s = students[i];
            if (s) renderView(s); else renderEdit();
            document.getElementById('modal-subtitle').innerText = `Ô số #${i+1}`;
            document.getElementById('modal').classList.replace('hidden', 'flex');
        }

        function renderView(s) {
            document.getElementById('edit-btn').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col items-center"><div class="w-52 h-52 rounded-[4rem] bg-white border-8 border-sky-50 overflow-hidden shadow-2xl rotate-2">
                    ${s.avatarImage ? `<img src="${s.avatarImage}" class="w-full h-full object-cover">` : `<i data-lucide="user" class="text-sky-100 w-full h-full p-12"></i>`}
                </div></div>
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-inner border-b-8 border-blue-50 text-4xl font-black text-blue-950 text-center">${s.name}</div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-4 rounded-3xl border-l-8 border-emerald-400 font-bold">🎂 ${s.birthday || '...'}</div>
                        <div class="bg-orange-50 p-4 rounded-3xl font-bold text-orange-700">🚀 ${s.dream || '...'}</div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] italic font-bold text-slate-600 shadow-inner">"${s.hobby || '...'}"</div>
                </div>`;
            lucide.createIcons();
        }

        function renderEdit(s = null) {
            document.getElementById('edit-btn').classList.add('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col items-center mb-6">
                    <div onclick="document.getElementById('fileInput').click()" class="w-40 h-40 rounded-[3rem] bg-white border-4 border-dashed border-blue-200 flex items-center justify-center overflow-hidden cursor-pointer">
                        <div id="avatar-preview">${s?.avatarImage ? `<img src="${s.avatarImage}" class="w-full h-full object-cover">` : '<i data-lucide="camera" class="text-blue-200 w-12 h-12"></i>'}</div>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleImg(this)">
                </div>
                <div class="grid gap-4">
                    <div class="flex gap-2 overflow-x-auto p-2">${colorThemes.map(t => `<div onclick="currentTheme='${t.class}'" class="w-10 h-10 rounded-full ${t.class} border-2 border-white shadow-md cursor-pointer"></div>`).join('')}</div>
                    <input id="f-name" placeholder="Họ và tên" class="w-full p-5 bg-slate-100 rounded-2xl font-black" value="${s?.name || ''}">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="f-birth" placeholder="Sinh nhật" class="w-full p-5 bg-slate-100 rounded-2xl font-bold" value="${s?.birthday || ''}">
                        <input id="f-dream" placeholder="Ước mơ" class="w-full p-5 bg-slate-100 rounded-2xl font-bold" value="${s?.dream || ''}">
                    </div>
                    <textarea id="f-hobby" placeholder="Sở thích" class="w-full p-5 bg-slate-100 rounded-3xl h-24 font-bold">${s?.hobby || ''}</textarea>
                    <input id="f-pass" type="password" placeholder="Mật khẩu bảo vệ" class="w-full p-5 bg-blue-50 rounded-2xl font-black">
                    <button onclick="submit()" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-xl text-xl uppercase">Gia nhập lớp 6A2</button>
                </div>`;
            lucide.createIcons();
        }

        function handleImg(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImageBase64 = e.target.result;
                document.getElementById('avatar-preview').innerHTML = `<img src="${currentImageBase64}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function submit() {
            const name = document.getElementById('f-name').value;
            const pass = document.getElementById('f-pass').value;
            if (!name || !pass) return alert("Cần Tên và Mật khẩu!");

            const payload = {
                slot_index: selectedSlot,
                name: name,
                birthday: document.getElementById('f-birth').value,
                dream: document.getElementById('f-dream').value,
                hobby: document.getElementById('f-hobby').value,
                password: pass,
                colorTheme: currentTheme,
                avatarImage: currentImageBase64 || students[selectedSlot]?.avatarImage || null
            };

            const { error } = await _supabase.from('students').upsert(payload, { onConflict: 'slot_index' });
            if (error) alert("Lỗi: " + error.message); else { closeModal(); loadData(); }
        }

        function editCurrentProfile() {
            const p = prompt("Mật khẩu:");
            if (p === students[selectedSlot].password) renderEdit(students[selectedSlot]);
            else alert("Sai mật khẩu!");
        }

        function closeModal() { document.getElementById('modal').classList.replace('flex', 'hidden'); currentImageBase64 = null; }

        window.onload = () => {
            loadData();
            const stars = document.getElementById('stars-container');
            for(let i=0; i<40; i++) {
                const s = document.createElement('div');
                s.className = 'absolute bg-white rounded-full animate-twinkle';
                s.style.cssText = `width:${Math.random()*3}px; height:${Math.random()*3}px; top:${Math.random()*100}%; left:${Math.random()*100}%`;
                stars.appendChild(s);
            }
        };
    </script>
</body>
</html>
